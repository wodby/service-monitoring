name: monitoring
title: Monitoring
icon: grafana
type: infrastructure
helm:
  name: grafana
  source: https://grafana.github.io/helm-charts
  chart: grafana/alloy
  version: 1.11.0
  values:
  - name: fullnameOverride
    value: '{{service.name}}'
  - name: crds.create
    value: false
  - name: service.enabled
    value: false
  - name: configReloader.enabled
    value: true
  - name: controller.type
    value: deployment
  - name: controller.replicas
    value: 1
  - name: alloy.enableReporting
    value: false

configs:
- name: alloy
  title: Alloy config
  helm: alloy.configMap.content
  processTokens: true
  config: config.alloy

workloads:
- name: main
  selector:
    matchLabels:
      app.kubernetes.io/instance: '{{helm.release}}'
  kind: deployment
  primary: true
  helm:
    labels: controller.podLabels
    annotations: controller.podAnnotations
  containers:
  - name: alloy
    helm:
      resources: alloy.resources
      env: alloy.extraEnv
