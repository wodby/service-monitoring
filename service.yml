name: monitoring
title: Monitoring
type: infrastructure
containers:
- name: alloy

helm:
  name: grafana
  source: https://grafana.github.io/helm-charts
  chart: grafana/k8s-monitoring
  version: 4.0.0
  configurations:
  - container: alloy
    resources: collectorCommon.alloy.alloy.resources
    env: collectorCommon.alloy.alloy.extraEnv
    labels: collectorCommon.alloy.controller.extraLabels
    annotations: collectorCommon.alloy.controller.extraAnnotations
  values:
  - name: cluster.name
    value: '{{kubernetes.id}}'
  - name: destinations
    value:
    - name: metrics
      type: prometheus
      url: '{{wodby_agent_metrics_endpoint}}'
      auth:
        type: basic
        username: '{{wodby_agent_username}}'
        password: '{{wodby_agent_password}}'
      tenantId: '{{org.id}}'
  - name: clusterMetrics.enabled
    value: true
  - name: clusterMetrics.kube-state-metrics.enabled
    value: false
  - name: clusterMetrics.node-exporter.enabled
    value: false
  - name: clusterMetrics.node-exporter.metricsTuning.includeMetrics
    value: 
    - node_cpu.*
    - node_exporter_build_info
    - node_filesystem.*
    - node_memory.*
    - process_cpu_seconds_total
    - process_resident_memory_bytes
    - node_load1
    - node_load15
    - node_load5
  - name: clusterMetrics.cadvisor.metricsTuning.includeMetrics
    value: 
    - container_cpu_cfs_periods_total
    - container_cpu_cfs_throttled_periods_total
    - container_cpu_usage_seconds_total
    - container_fs_reads_bytes_total
    - container_fs_reads_total
    - container_fs_writes_bytes_total
    - container_fs_writes_total
    - container_memory_cache
    - container_memory_rss
    - container_memory_swap
    - container_memory_working_set_bytes
    - container_network_receive_bytes_total
    - container_network_receive_packets_dropped_total
    - container_network_receive_packets_total
    - container_network_transmit_bytes_total
    - container_network_transmit_packets_dropped_total
    - container_network_transmit_packets_total
    - machine_memory_bytes
    - machine_cpu_cores
  - name: fullnameOverride
    value: '{{service.name}}'
  - name: annotationAutodiscovery.enabled
    value: false
  - name: prometheusOperatorObjects.enabled
    value: false
  - name: applicationObservability.enabled
    value: false
  - name: clusterEvents.enabled
    value: false
  - name: podLogsViaLoki.enabled
    value: false
  - name: podLogsViaOpenTelemetry.enabled
    value: false
  - name: podLogsViaKubernetesApi.enabled
    value: false
  - name: podLogsObjects.enabled
    value: false
  - name: costMetrics.enabled
    value: false
  - name: telemetryServices.kube-state-metrics.deploy
    value: false
  - name: telemetryServices.node-exporter.deploy
    value: false
  - name: telemetryServices.opencost.deploy
    value: false
  - name: telemetryServices.kepler.deploy
    value: false
  - name: telemetryServices.windows-exporter.deploy
    value: false
  - name: alloy-operator.deploy
    value: true
