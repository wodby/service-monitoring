name: monitoring
title: Monitoring
type: infrastructure
hostname: monitoring
containers:
- name: alloy
  env:
  - name: CLUSTER_NAME
    value: '{{kubernetes.name}}'

helm:
  name: wodby
  source: oci://registry-1.docker.io/wodby/alloy
  chart: wodby/alloy
  version: 0.1.1
  configurations:
  - name: alloy
    resources: alloy.resources
    env: alloy.extraEnv
  values:
  - name: host
    value: '{{wodby_agent_metrics_endpoint}}'
  - name: basicAuth.username
    value: '{{wodby_agent_username}}'
  - name: basicAuth.password
    value: '{{wodby_agent_password}}'
